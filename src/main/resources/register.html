<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aura Tech Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <div class="logo">Aura <span>Tech</span> Stores</div>
    <div>
        <a href="/products">Products</a>
        <a href="/login">Login</a>
    </div>
</div>
<div class="form-box">
    <h1>Create Account</h1>
    <p class="note">Register as a user to browse Aura Tech products.</p>
    <p class="error" th:text="${message}"></p>
    <form action="/register" method="post" th:object="${user}">
        <label>Username</label>
        <input type="text" th:field="*{username}" required minlength="4">
        <p class="error" th:errors="*{username}"></p>
        <label>Password</label>
        <input type="password" th:field="*{password}" required minlength="5">
        <p class="error" th:errors="*{password}"></p>
        <label>Email</label>
        <input type="email" th:field="*{email}" required>
        <p class="error" th:errors="*{email}"></p>
        <button class="btn" type="submit">Register</button>
    </form>
</div>
</body>
</html>
