<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aura Tech Product Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <div class="logo">Aura <span>Tech</span> Product</div>
    <div>
        <a href="/admin/home">Admin Home</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="form-box">
    <h1>Product Form</h1>
    <p class="note">Save product details, branch stock and image path.</p>
    <form action="/admin/products/save" method="post" th:object="${product}">
        <input type="hidden" th:field="*{id}">
        <label>Name</label>
        <input type="text" th:field="*{name}" required>
        <p class="error" th:errors="*{name}"></p>
        <label>Category</label>
        <input type="text" th:field="*{category}" required>
        <p class="error" th:errors="*{category}"></p>
        <label>Price</label>
        <input type="number" step="0.01" th:field="*{price}" required min="1">
        <p class="error" th:errors="*{price}"></p>
        <label>Branch</label>
        <select th:field="*{branch}" required>
            <option value="Cairo">Cairo</option>
            <option value="Alexandria">Alexandria</option>
        </select>
        <label>Stock</label>
        <input type="number" th:field="*{stock}" required min="0">
        <p class="error" th:errors="*{stock}"></p>
        <label>Image Path</label>
        <select th:field="*{imageUrl}" required>
            <option value="/images/phone.svg">Phone Image</option>
            <option value="/images/laptop.svg">Laptop Image</option>
            <option value="/images/headphones.svg">Headphones Image</option>
            <option value="/images/watch.svg">Watch Image</option>
        </select>
        <label>Description</label>
        <textarea th:field="*{description}" required></textarea>
        <p class="error" th:errors="*{description}"></p>
        <button class="btn" type="submit">Save Product</button>
    </form>
</div>
</body>
</html>
