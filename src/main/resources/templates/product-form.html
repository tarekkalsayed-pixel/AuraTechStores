<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aura Tech Product Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="nav">
    <div class="logo">Aura <span>Tech</span> Product</div>
    <div>
        <a href="/admin/home">Admin Home</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="form-box">
    <h1>Product Form</h1>
    <p class="note">Save product details, branch stock and image path.</p>
    <form action="/admin/products/save" method="post" th:object="${product}">
        <input type="hidden" th:field="*{id}">
        <label for="name">Name</label>
        <input id="name" type="text" th:field="*{name}" required>
        <p class="error" th:errors="*{name}"></p>
        <label for="category">Category</label>
        <input id="category" type="text" th:field="*{category}" required>
        <p class="error" th:errors="*{category}"></p>
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" th:field="*{price}" required min="1">
        <p class="error" th:errors="*{price}"></p>
        <label for="discount">Discount %</label>
        <input id="discount" type="number" th:field="*{discount}" min="0" max="100" required>
        <p class="error" th:errors="*{discount}"></p>
        <label for="branch">Branch</label>
        <select id="branch" th:field="*{branch}" required>
            <option value="Cairo">Cairo</option>
            <option value="Alexandria">Alexandria</option>
        </select>
        <label for="stock">Stock</label>
        <input id="stock" type="number" th:field="*{stock}" required min="0">
        <p class="error" th:errors="*{stock}"></p>
        <label for="imageUrl">Image Path</label>
        <select id="imageUrl" th:field="*{imageUrl}" required>
            <option value="/images/phone.jpeg">Phone Image</option>
            <option value="/images/laptop.jpeg">Laptop Image</option>
            <option value="/images/headphone.jpeg">Headphones Image</option>
            <option value="/images/watch.jpeg">Watch Image</option>
        </select>
        <label for="description">Description</label>
        <textarea id="description" th:field="*{description}" required maxlength="1000"></textarea>
        <p class="error" th:errors="*{description}"></p>
        <button class="btn" type="submit">Save Product</button>
    </form>
</div>
<script src="/js/cookie-consent.js"></script>
</body>
</html>
